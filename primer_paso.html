<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El primer gran paso 💜</title>

  <!-- Fuente cursiva -->
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Dancing Script', cursive;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #e6ccff, #f8e8ff);
      border: 18px solid #c8a2c8;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 25px;
      color: #4a1f5c;
    }

    .contenedor {
      max-width: 600px;
      text-align: center;
      animation: aparecer 1.5s ease forwards;
    }

    h1 {
      font-size: clamp(3rem, 7vw, 4.5rem);
      margin-bottom: 25px;
    }

    p {
      font-size: 1.7rem;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .firma {
      margin-top: 30px;
      font-size: 1.9rem;
      opacity: 0.9;
    }

    .volver {
      margin-top: 40px;
      display: inline-block;
      text-decoration: none;
      padding: 14px 36px;
      border-radius: 30px;
      background: #ff5e9c;
      color: white;
      font-size: 1.3rem;
      transition: all 0.3s ease;
    }

    .volver:hover {
      background: #3cb371;
      font-weight: 700;
      transform: scale(1.06);
    }

    @keyframes aparecer {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="contenedor">
    <h1>El primer gran paso</h1>

    <p>
      No sé en qué momento pasó,<br>
      pero un día tu nombre empezó a sonar<br>
      más fuerte que mis miedos.
    </p>

    <p>
      Este es mi primer paso,<br>
      torpe, sincero,<br>
      pero lleno de ganas de quedarme.
    </p>

    <p>
      No prometo perfección,<br>
      prometo intención,<br>
      risas, apoyo y un corazón honesto.
    </p>

    <div class="firma">
      — tu loquito enamorado 💜
    </div>

    <a href="menu.html" class="volver">Volver 💫</a>
  </div>
</body>
</html>
