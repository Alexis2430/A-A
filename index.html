<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para ti 💜</title>

  <!-- Misma letra que la anterior -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    *{ margin:0; padding:0; box-sizing:border-box; }

    :root{
      --marco:#c8a2c8;
      --rosa:#ff5e9c;
      --verde:#3cb371;
    }

    body{
      min-height:100vh;
      background-image: url("img/fondo.png.jpg"); /* <- TU NOMBRE EXACTO */
      background-size: cover;
      background-position: center;
      background-attachment: fixed;

      border: 18px solid var(--marco);
      font-family: 'Cormorant Garamond', Georgia, "Times New Roman", serif;
    }

    @media (max-width: 520px){
      body{ border-width: 10px; }
    }

    .overlay{
      min-height:100vh;
      background: rgba(0,0,0,0.60);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      color:white;
      padding: 30px 18px;
      animation: aparecer 1.1s ease forwards;
    }

    h1{
      font-size: clamp(2.6rem, 7vw, 4.2rem);
      margin-bottom: 16px;
      letter-spacing: .2px;
    }

    p{
      font-size: clamp(1.2rem, 3.5vw, 1.9rem);
      opacity: 0.92;
      margin-bottom: 18px;
    }

    .fecha{
      margin-bottom: 28px;
      font-size: clamp(1.05rem, 3vw, 1.45rem);
      opacity: 0.95;
      line-height: 1.35;
    }

    .btn{
      display:inline-block;
      padding: 14px 40px;
      border-radius: 40px;
      border: none;
      background: var(--rosa);
      color: white;
      font-size: 1.25rem;
      cursor: pointer;
      text-decoration: none;
      transition: transform .18s ease, background .18s ease;
      font-weight: 600;
    }

    .btn:hover{
      background: var(--verde);
      transform: scale(1.07);
    }

    @keyframes aparecer{
      from{ opacity:0; transform: translateY(22px); }
      to{ opacity:1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="overlay">
    <h1>Te adoro hoy y siempre</h1>
    <p>de tu loquito enamorado</p>

    <div class="fecha" id="fechaTexto"></div>

    <a href="menu.html" class="btn">Te amo 💚</a>
  </div>

  <script>
    const fechaInicio = new Date(2025, 2, 9); // marzo = 2
    const hoy = new Date();
    hoy.setHours(12, 0, 0, 0);

    const opciones = { day:'numeric', month:'long', year:'numeric' };
    const inicioTexto = fechaInicio.toLocaleDateString('es-MX', opciones);
    const hoyTexto = hoy.toLocaleDateString('es-MX', opciones);

    document.getElementById("fechaTexto").innerHTML =
      `Desde el <b>${inicioTexto}</b> — hoy es <b>${hoyTexto}</b><br>te extraño 💜`;
  </script>
</body>
</html>
